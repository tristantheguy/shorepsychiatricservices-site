<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hi Mom 💖</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #ffe3f3, #fff9df);
      color: #4a2a3a;
      text-align: center;
      padding: 24px;
    }

    main {
      background: rgba(255, 255, 255, 0.86);
      border: 3px dashed #ff9ac7;
      border-radius: 20px;
      max-width: 720px;
      width: 100%;
      padding: 28px;
      box-shadow: 0 12px 24px rgba(92, 44, 68, 0.15);
    }

    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 6vw, 3rem);
    }

    p {
      font-size: 1.2rem;
      line-height: 1.5;
      margin: 10px 0 20px;
    }

    .construction {
      width: min(100%, 420px);
      margin: 0 auto;
      display: block;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hi Mom, love you 💕</h1>
    <p>
      Your future website is under construction!<br />
      Something beautiful is on the way 🚧✨
    </p>

    <svg class="construction" viewBox="0 0 500 320" role="img" aria-label="Cute cat construction scene">
      <rect width="500" height="320" fill="#fff5fb" rx="18" />
      <rect x="40" y="55" width="420" height="36" rx="8" fill="#ffcc4d" />
      <text x="250" y="80" text-anchor="middle" font-size="24" font-family="Verdana" fill="#5b3a00">UNDER CONSTRUCTION</text>

      <rect x="56" y="235" width="388" height="55" fill="#ffd59c" rx="12" />
      <rect x="80" y="235" width="35" height="55" fill="#f6b668" />
      <rect x="385" y="235" width="35" height="55" fill="#f6b668" />

      <circle cx="250" cy="170" r="62" fill="#f5d0a9" />
      <circle cx="225" cy="164" r="8" fill="#4b2d1b" />
      <circle cx="275" cy="164" r="8" fill="#4b2d1b" />
      <ellipse cx="250" cy="185" rx="12" ry="8" fill="#f7a8b8" />
      <path d="M236 198 Q250 214 264 198" stroke="#8d5a40" stroke-width="4" fill="none" stroke-linecap="round" />

      <polygon points="201,122 225,95 234,133" fill="#f5d0a9" />
      <polygon points="299,122 275,95 266,133" fill="#f5d0a9" />

      <rect x="205" y="108" width="90" height="20" rx="6" fill="#ffc531" />
      <rect x="246" y="102" width="8" height="8" fill="#ff8d00" />

      <text x="250" y="282" text-anchor="middle" font-size="24" font-family="Verdana" fill="#8a3f67">Coming soon, with love 💝</text>
    </svg>
  </main>
</body>
</html>
